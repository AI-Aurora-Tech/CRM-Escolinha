    <script>
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered'))
            .catch(err => console.log('SW registration failed', err));
        });
      }

      // CRITICAL: Robust Polyfill for Node.js globals in Browser
      window.global = window;
      window.process = {
        env: { DEBUG: undefined },
        version: '',
        versions: {},
        platform: 'browser',
      };
      window.Buffer = window.Buffer || [];
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              primary: {
                50: '#eff6ff',
                100: '#dbeafe',
                200: '#bfdbfe',
                300: '#93c5fd',
                400: '#60a5fa',
                500: '#3b82f6', // Blue
                600: '#2563eb',
                700: '#1d4ed8',
                800: '#1e40af',
                900: '#1e3a8a',
                950: '#172554',
              }
            }
          }
        }
      }
    </script>
  <script type="importmap">
{
  "imports": {

</head>
  <body class="bg-blue-50 text-blue-900 font-sans antialiased">
    <div id="root"></div>
    <script>
      // Global error handler for chunk loading failures (common after deployments)
      window.addEventListener('error', (event) => {
        const msg = event.message || '';
        if (msg.includes('ChunkLoadError') || msg.includes('Loading chunk') || msg.includes('missing')) {
          console.warn('Chunk load error detected, reloading page...');
          const lastReload = sessionStorage.getItem('last_chunk_reload');
          const now = Date.now();
          if (!lastReload || now - parseInt(lastReload) > 5000) {
            sessionStorage.setItem('last_chunk_reload', now.toString());
            window.location.reload(true);
          }
        }
      }, true);

      // Fail-safe: If React doesn't mount within 4 seconds, show a recovery screen.
      setTimeout(() => {
        const root = document.getElementById('root');
        if (root && !root.hasChildNodes()) {
          console.error('App failed to mount (White Screen of Death detected).');
          
          const errorDiv = document.createElement('div');
          errorDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;z-index:9999;font-family:sans-serif;color:#333;';
          
          errorDiv.innerHTML = `
            <div style="max-width: 400px;">
              <h2 style="color: #2563eb; margin-bottom: 10px;">Atualização Necessária</h2>
              <p style="margin-bottom: 20px; color: #666;">O sistema foi atualizado. Clique no botão abaixo para carregar a nova versão.</p>
              <button id="reload-btn" style="background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2);">
                Atualizar Agora
              </button>
            </div>
          `;
          
          document.body.appendChild(errorDiv);
          
          document.getElementById('reload-btn').onclick = () => {
            sessionStorage.clear();
            localStorage.clear();
            window.location.reload(true);
          };
        }
      }, 4000);
    </script>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
