    <script>
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered'))
            .catch(err => console.log('SW registration failed', err));
        });
      }

      // CRITICAL: Robust Polyfill for Node.js globals in Browser
      window.global = window;
      window.process = {
        env: { DEBUG: undefined },
        version: '',
        versions: {},
        platform: 'browser',
      };
      window.Buffer = window.Buffer || [];
    </script>

              }
            }
          }
        }
      }
    </script>

  <body class="bg-blue-50 text-blue-900 font-sans antialiased">
    <div id="root"></div>
    <script>
      // Robust error handler for resource load failures (404s on JS/CSS)
      window.addEventListener('error', (event) => {
        // Check if it's a resource load error (no message, has target)
        const isResourceError = event.target && (event.target.tagName === 'SCRIPT' || event.target.tagName === 'LINK');
        const msg = event.message || '';
        const isChunkError = msg.includes('ChunkLoadError') || msg.includes('Loading chunk') || msg.includes('missing');

        if (isResourceError || isChunkError) {
          console.warn('Resource load error detected, attempting recovery...', event);
          
          const lastReload = sessionStorage.getItem('last_version_reload');
          const now = Date.now();
          
          // Only auto-reload once every 10 seconds to avoid infinite loops
          if (!lastReload || now - parseInt(lastReload) > 10000) {
            sessionStorage.setItem('last_version_reload', now.toString());
            
            // Clear caches and force reload from server
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then(regs => {
                for(let reg of regs) reg.unregister();
              });
            }
            
            // Use window.location.href to force a clean reload
            window.location.href = window.location.origin + window.location.pathname + '?v=' + now;
          } else {
            // If we already reloaded recently and it still fails, show the manual button
            showRecoveryUI();
          }
        }
      }, true);

      function showRecoveryUI() {
        if (document.getElementById('recovery-ui')) return;
        
        const errorDiv = document.createElement('div');
        errorDiv.id = 'recovery-ui';
        errorDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;z-index:9999;font-family:sans-serif;color:#333;';
        
        errorDiv.innerHTML = `
          <div style="max-width: 400px;">
            <h2 style="color: #2563eb; margin-bottom: 10px;">Atualização Necessária</h2>
            <p style="margin-bottom: 20px; color: #666;">O sistema foi atualizado para uma nova versão. Clique no botão abaixo para carregar as novidades.</p>
            <button id="reload-btn" style="background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2);">
              Atualizar Sistema
            </button>
          </div>
        `;
        
        document.body.appendChild(errorDiv);
        document.getElementById('reload-btn').onclick = () => {
          sessionStorage.clear();
          localStorage.clear();
          window.location.href = window.location.origin + window.location.pathname + '?refresh=' + Date.now();
        };
      }

      // Fail-safe: If React doesn't mount within 5 seconds, show recovery UI
      setTimeout(() => {
        const root = document.getElementById('root');
        if (root && !root.hasChildNodes()) {
          console.error('App failed to mount (White Screen detected).');
          showRecoveryUI();
        }
      }, 5000);
    </script>
    <script type="module" src="/index.tsx"></script>
  </body>
